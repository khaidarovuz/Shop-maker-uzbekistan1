services:
  - type: web
    name: shopmaker-uz-bot
    runtime: python
    buildCommand: python -m venv /opt/render/project/venv && /opt/render/project/venv/bin/pip install --upgrade pip && /opt/render/project/venv/bin/pip install -r shopmaker/requirements.txt
    startCommand: cd shopmaker && /opt/render/project/venv/bin/python main.py
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
