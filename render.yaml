services:
  - type: web
    name: shopmaker-uz-bot
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install --only-binary=:all: pydantic-core==2.27.2 && pip install --prefer-binary -r shopmaker/requirements.txt
    startCommand: cd shopmaker && python main.py
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"
