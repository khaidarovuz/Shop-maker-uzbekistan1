services:
  - type: web
    name: shopmaker-uz-bot
    runtime: python
    buildCommand: CARGO_HOME=/opt/render/project/src/.cargo uv pip install --system -r shopmaker/requirements.txt
    startCommand: cd shopmaker && python main.py
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
